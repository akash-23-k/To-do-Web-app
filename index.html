<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Your Futuristic Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen" class="auth-screen">
  <div class="auth-bg">
    <div class="grid-overlay"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
  </div>
  <div class="auth-card">
    <div class="brand">
      <span class="brand-icon">◈</span>
      <h1 class="brand-name">TASK<span>FLOW</span></h1>
    </div>
    <p class="auth-tagline">The future of getting things done.</p>
    <button class="google-btn" id="google-login-btn">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#EA4335" d="M5.266 9.765A7.077 7.077 0 0 1 12 4.909c1.69 0 3.218.6 4.418 1.582L19.91 3C17.782 1.145 15.055 0 12 0 7.27 0 3.198 2.698 1.24 6.65l4.026 3.115Z"/><path fill="#34A853" d="M16.04 18.013c-1.09.703-2.474 1.078-4.04 1.078a7.077 7.077 0 0 1-6.723-4.823l-4.04 3.067A11.965 11.965 0 0 0 12 24c2.933 0 5.735-1.043 7.834-3l-3.793-2.987Z"/><path fill="#4A90E2" d="M19.834 21c2.195-2.048 3.62-5.096 3.62-9 0-.71-.109-1.473-.272-2.182H12v4.637h6.436c-.317 1.559-1.17 2.766-2.395 3.558L19.834 21Z"/><path fill="#FBBC05" d="M5.277 14.268A7.12 7.12 0 0 1 4.909 12c0-.782.125-1.533.357-2.235L1.24 6.65A11.934 11.934 0 0 0 0 12c0 1.92.445 3.73 1.237 5.335l4.04-3.067Z"/></svg>
      Continue with Google
    </button>
    <div class="auth-divider"><span>or</span></div>
    <div class="demo-login">
      <input type="text" id="demo-name" placeholder="Enter your name" class="demo-input" />
      <button class="demo-btn" id="demo-login-btn">Enter TaskFlow →</button>
    </div>
    <p class="auth-note">No account needed for demo. Data stored locally.</p>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" class="app hidden">

  <!-- TOP NAV -->
  <nav class="navbar">
    <div class="nav-left">
      <span class="nav-brand">◈ TASKFLOW</span>
      <div class="user-badge" id="user-badge">
        <div class="user-avatar" id="user-avatar">A</div>
        <span class="user-name" id="user-name-display">User</span>
      </div>
    </div>
    <div class="nav-right">
      <div class="stats-pill">
        <span id="pending-count">0</span> pending · <span id="done-count">0</span> done
      </div>
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
        <span class="toggle-icon" id="theme-icon">☽</span>
      </button>
      <button class="logout-btn" id="logout-btn" title="Logout">⏻</button>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main class="main">

    <!-- TASK INPUT -->
    <section class="create-section">
      <div class="create-card">
        <div class="create-header">
          <span class="section-label">/ NEW TASK</span>
        </div>
        <div class="create-row">
          <input type="text" id="task-input" class="task-input" placeholder="What needs to be done..." maxlength="200" />
          <button class="add-btn" id="add-btn">
            <span>+</span>
          </button>
        </div>
        <div class="task-meta-row">
          <div class="meta-group">
            <label class="meta-label">⏰ DUE TIME</label>
            <input type="datetime-local" id="task-time" class="meta-input" />
          </div>
          <div class="meta-group">
            <label class="meta-label">🔔 REMINDER</label>
            <select id="reminder-select" class="meta-input">
              <option value="">No reminder</option>
              <option value="5">5 min before</option>
              <option value="15">15 min before</option>
              <option value="30">30 min before</option>
              <option value="60">1 hour before</option>
              <option value="1440">1 day before</option>
            </select>
          </div>
          <div class="meta-group">
            <label class="meta-label">🏷 PRIORITY</label>
            <select id="priority-select" class="meta-input">
              <option value="normal">Normal</option>
              <option value="high">High</option>
              <option value="critical">Critical</option>
            </select>
          </div>
        </div>
        <div id="char-count" class="char-count">0 / 200</div>
      </div>
    </section>

    <!-- FILTER TABS -->
    <div class="filter-tabs">
      <button class="tab active" data-filter="all">ALL</button>
      <button class="tab" data-filter="pending">PENDING</button>
      <button class="tab" data-filter="done">COMPLETED</button>
      <button class="tab" data-filter="critical">CRITICAL</button>
    </div>

    <!-- TASK LIST -->
    <section class="task-section">
      <div id="task-list" class="task-list">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">◈</div>
          <p>No tasks yet. Create your first mission above.</p>
        </div>
      </div>
    </section>

  </main>
</div>

<!-- NOTIFICATION TOAST -->
<div id="toast" class="toast hidden">
  <span id="toast-msg"></span>
</div>

<!-- REMINDER OVERLAY -->
<div id="reminder-overlay" class="reminder-overlay hidden">
  <div class="reminder-card">
    <div class="reminder-icon">⚡</div>
    <h3 id="reminder-title">Task Reminder</h3>
    <p id="reminder-body"></p>
    <button id="reminder-dismiss">DISMISS</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
